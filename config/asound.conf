pcm.!default {
    type asym
    playback.pcm {
        type dmix
        ipc_key 1024
        slave {
            pcm "hw:0,0"
            rate 16000
            format S16_LE
            channels 1
        }
    }
    capture.pcm {
        type dsnoop
        ipc_key 2048
        slave {
            pcm "hw:0,0"
            rate 16000
            format S16_LE
            channels 1
        }
    }
}

ctl.!default {
    type hw
    card 0
}
